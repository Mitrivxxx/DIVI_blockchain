name: divi

services:
  db:
    image: postgres:16-alpine
    container_name: divi-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-IssuerDb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: divi-backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5021

      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-IssuerDb}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}

      Jwt__Key: ${JWT_KEY:-change_me_in_env}
      Jwt__Issuer: ${JWT_ISSUER:-DIVI}

      Blockchain__RpcUrl: ${BLOCKCHAIN_RPC_URL:-https://sepolia.infura.io/v3/replace_me}
      Blockchain__ContractAddress: ${BLOCKCHAIN_CONTRACT_ADDRESS:-0x0000000000000000000000000000000000000000}
      SEPOLIA_PRIVATE_KEY: ${SEPOLIA_PRIVATE_KEY:-}

      PINATA_JWT: ${PINATA_JWT:-}

      Cors__AllowedOrigins__0: ${CORS_ALLOWED_ORIGIN_DEV:-http://localhost:3000}
      Cors__AllowedOrigins__1: ${CORS_ALLOWED_ORIGIN_PROD:-http://localhost:8080}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5021:5021"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:5021/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8

  frontend:
    profiles: ["dev"]
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: divi-frontend-dev
    restart: unless-stopped
    environment:
      VITE_PROXY_TARGET: http://backend:5021
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  web:
    profiles: ["prod"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: divi-web
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy

  blockchain-tools:
    profiles: ["tools"]
    build:
      context: ./blockchain
      dockerfile: Dockerfile
    container_name: divi-blockchain-tools
    working_dir: /app
    stdin_open: true
    tty: true
    command: ["sleep", "infinity"]
    volumes:
      - ./blockchain:/app

  hardhat-node:
    profiles: ["tools"]
    build:
      context: ./blockchain
      dockerfile: Dockerfile
    container_name: divi-hardhat-node
    working_dir: /app
    command: ["npx", "hardhat", "node", "--hostname", "0.0.0.0"]
    ports:
      - "8545:8545"
    volumes:
      - ./blockchain:/app

volumes:
  db_data:
  frontend_node_modules: